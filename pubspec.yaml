name: czechbmx_app
description: Czech BMX – Oficiální mobilní aplikace
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0

  # HTML rendering (CKEditor content z API)
  flutter_widget_from_html: ^0.15.2
  html: ^0.15.6

  # Images
  cached_network_image: ^3.4.1

  # Typography
  google_fonts: ^6.2.1

  # JSON
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2
  shimmer: ^3.0.0
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  flutter_secure_storage: ^9.2.2
  just_audio: ^0.9.42
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0
  app_links: ^6.3.4
  connectivity_plus: ^6.1.4
  add_2_calendar: ^3.0.1
  local_auth: ^2.3.0
  path_provider: ^2.1.4
  open_file: ^3.5.10
  mobile_scanner: ^7.0.0
  flutter_map: ^8.0.0
  latlong2: ^0.9.1
  home_widget: ^0.7.0

  # Push notifications
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_kruh.png"
  adaptive_icon_background: "#080A0F"
  adaptive_icon_foreground: "assets/images/logo_kruh.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
